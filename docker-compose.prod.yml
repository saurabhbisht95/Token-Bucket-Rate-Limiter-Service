services:
  postgres:
    image: postgres:16-alpine
    container_name: limiter-postgres-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rate_limiter
    volumes:
      - limiter_postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rate_limiter"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: limiter-redis-prod
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - limiter_redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "src/db/migrate.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/rate_limiter
      REDIS_URL: redis://redis:6379
      ADMIN_API_KEY: change-this-super-secret-admin-key
      CONFIG_CACHE_TTL_SECONDS: 60
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: limiter-api-1
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/rate_limiter
      REDIS_URL: redis://redis:6379
      ADMIN_API_KEY: change-this-super-secret-admin-key
      CONFIG_CACHE_TTL_SECONDS: 60
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: limiter-api-2
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/rate_limiter
      REDIS_URL: redis://redis:6379
      ADMIN_API_KEY: change-this-super-secret-admin-key
      CONFIG_CACHE_TTL_SECONDS: 60
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: limiter-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy

volumes:
  limiter_postgres_prod_data:
  limiter_redis_prod_data: